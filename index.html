<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Real-Time Chat</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen">

    <div id="setup" class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Join the Chat</h2>
        <input id="username" type="text" placeholder="Enter your name" class="w-full p-3 mb-4 bg-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="startChat()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">Start Chatting</button>
    </div>

    <div id="chat-container" class="hidden bg-slate-800 w-full max-w-2xl h-[600px] rounded-2xl shadow-xl flex flex-col border border-slate-700 overflow-hidden">
        <div class="bg-slate-700 p-4 border-b border-slate-600 font-bold text-lg">Global Chat Room</div>
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div id="typing" class="px-4 text-xs text-blue-400 italic h-4"></div>
        <div class="p-4 bg-slate-700/50 flex gap-2">
            <input id="msg-input" type="text" placeholder="Type a message..." class="flex-1 p-3 bg-slate-800 rounded-xl outline-none border border-slate-600">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-500">Send</button>
        </div>
    </div>

    <script>
        let username = "";
        // REPLACE THIS with a free key from Ably.com to make it work live!
        const ably = new Ably.Realtime('ofYSlg.NyvXgw:KyPp-bERwXsUG1halmpr1raasMb2cOO_dL8FEbM9iMA'); 
        const channel = ably.channels.get('global-chat');

        function startChat() {
            username = document.getElementById('username').value;
            if (username) {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('chat-container').classList.remove('hidden');
                
                // Listen for messages
                channel.subscribe('message', (msg) => {
                    renderMessage(msg.data);
                });
            }
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value;
            if (text) {
                channel.publish('message', {
                    user: username,
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                input.value = '';
            }
        }

        function renderMessage(data) {
            const container = document.getElementById('messages');
            const isMe = data.user === username;
            
            const msgHtml = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <div class="px-4 py-2 rounded-2xl max-w-[80%] ${isMe ? 'bg-blue-600' : 'bg-slate-700 text-slate-100'}">
                        <p class="text-sm">${data.text}</p>
                    </div>
                    <span class="text-[10px] text-slate-500 mt-1">${data.user} • ${data.time}</span>
                </div>
            `;
            container.innerHTML += msgHtml;
            container.scrollTop = container.scrollHeight;
        }

        // Send "Enter" key support
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
