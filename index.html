<!DOCTYPE html>
<html lang="en">
<head><base href="https://d16ilfvy4mv02r.cloudfront.net/workspaces/dCBi9yFPoDythQuO8RpzcylbjO3YgVoX/64fa02ba-05d8-433e-9830-6dfc3965b9b3/files/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonChat — Real-Time Chat</title>
<script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.6.2.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bgh:#22223a;
  --ac:#7c3aed;--ac2:#06b6d4;--acg:rgba(124,58,237,.3);
  --t1:#f0f0ff;--t2:#9090b0;--tm:#5a5a7a;
  --br:rgba(255,255,255,.07);--bra:rgba(124,58,237,.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--bra);border-radius:4px;}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;
  background-image:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(124,58,237,.12),transparent 60%),
  radial-gradient(ellipse 60% 80% at 80% 80%,rgba(6,182,212,.10),transparent 60%);}
.card{background:var(--bg2);border:1px solid var(--br);border-radius:24px;padding:44px 38px;width:410px;max-width:93vw;
  text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.5);animation:up .45s ease;}
@keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.logo{font-size:50px;margin-bottom:6px;filter:drop-shadow(0 0 20px rgba(124,58,237,.8));}
.title{font-size:28px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.sub{color:var(--tm);font-size:13px;margin-bottom:26px;}
.avpick{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.avo{width:44px;height:44px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:all .2s;font-size:20px;display:flex;align-items:center;justify-content:center;}
.avo:hover{transform:scale(1.12);}
.avo.sel{border-color:#fff;transform:scale(1.18);box-shadow:0 0 14px rgba(255,255,255,.25);}
.inp{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--br);border-radius:11px;
  color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:9px;transition:border-color .2s;}
.inp:focus{border-color:var(--ac);}
.inp::placeholder{color:var(--tm);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;border-radius:11px;
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;
  font-family:'Inter',sans-serif;box-shadow:0 8px 24px rgba(124,58,237,.35);margin-top:4px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(124,58,237,.5);}
.hint{font-size:11px;color:var(--tm);margin-top:10px;}

/* APP */
#app{display:none;width:100%;height:100vh;}

/* LAYOUT */
.layout{display:flex;height:100vh;}

/* SIDEBAR */
.sb{width:255px;background:var(--bg2);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;}
.sb-head{padding:17px 18px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:9px;}
.brand{font-size:18px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cdot{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tm);}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite;}
.dot.off{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rl{padding:13px 18px 5px;font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--tm);text-transform:uppercase;}
.ri{margin:2px 9px;padding:8px 13px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:9px;
  transition:all .15s;color:var(--t2);font-size:13px;font-weight:500;}
.ri:hover{background:var(--bgh);color:var(--t1);}
.ri.active{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(6,182,212,.1));color:#fff;border:1px solid var(--bra);}
.nr{padding:10px 12px;border-top:1px solid var(--br);}
.nr-row{display:flex;gap:5px;}
.nr-row input{flex:1;background:var(--bg3);border:1px solid var(--br);border-radius:8px;color:var(--t1);
  font-size:12px;padding:6px 9px;outline:none;font-family:'Inter',sans-serif;}
.nr-row input:focus{border-color:var(--ac);}
.nr-row button{padding:6px 10px;border-radius:8px;background:var(--ac);border:none;color:#fff;cursor:pointer;font-size:15px;font-weight:700;}
.sf{padding:12px;border-top:1px solid var(--br);}
.uself{display:flex;align-items:center;gap:9px;padding:9px;border-radius:9px;background:var(--bg3);}
.uself-name{font-size:13px;font-weight:600;}
.uself-st{font-size:10px;color:#22c55e;}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.ch{padding:13px 20px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:11px;
  background:rgba(10,10,15,.9);backdrop-filter:blur(12px);}
.ch-name{font-size:15px;font-weight:700;}
.ch-desc{font-size:11px;color:var(--tm);}
.hact{margin-left:auto;display:flex;gap:5px;}
.hbtn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--br);
  color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.hbtn:hover{background:var(--bgh);color:var(--t1);}

#msgs{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;}
.mg{display:flex;flex-direction:column;gap:2px;margin:3px 0;}
.mg.own{align-items:flex-end;}
.sr{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.mg.own .sr{flex-direction:row-reverse;}
.mav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.mun{font-size:11px;font-weight:600;color:var(--tm);}
.mt{font-size:10px;color:var(--tm);}
.mb{max-width:490px;padding:9px 14px;border-radius:17px;font-size:14px;line-height:1.54;
  position:relative;word-wrap:break-word;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.mg.own .mb{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border-bottom-right-radius:4px;}
.mg:not(.own) .mb{background:#1e1e2e;border:1px solid var(--br);border-bottom-left-radius:4px;}
.mimg{max-width:270px;border-radius:10px;cursor:zoom-in;display:block;margin-top:3px;}
.mreact{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.rc{background:var(--bg3);border:1px solid var(--br);border-radius:20px;padding:2px 7px;
  font-size:12px;cursor:pointer;transition:all .15s;display:flex;gap:3px;align-items:center;}
.rc:hover{background:var(--bgh);transform:scale(1.07);}
.rc.me{border-color:var(--ac);background:rgba(124,58,237,.15);}
.rcn{font-size:10px;color:var(--tm);font-weight:600;}
.rbtn{opacity:0;transition:opacity .2s;position:absolute;right:-32px;top:50%;transform:translateY(-50%);
  width:25px;height:25px;border-radius:50%;background:var(--bg3);border:1px solid var(--br);
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.mg.own .rbtn{right:auto;left:-32px;}
.mb:hover .rbtn{opacity:1;}
.msys{text-align:center;padding:4px 0;font-size:11px;color:var(--tm);display:flex;align-items:center;gap:8px;}
.msys::before,.msys::after{content:'';flex:1;height:1px;background:var(--br);}

#tybar{padding:3px 20px;min-height:22px;font-size:12px;color:var(--tm);display:flex;align-items:center;gap:6px;}
.tdots{display:flex;gap:3px;}
.tdots span{width:4px;height:4px;border-radius:50%;background:var(--tm);animation:bo 1.2s infinite;}
.tdots span:nth-child(2){animation-delay:.2s;}
.tdots span:nth-child(3){animation-delay:.4s;}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.ia{padding:10px 20px 16px;background:var(--bg2);border-top:1px solid var(--br);}
.irow{display:flex;align-items:flex-end;gap:7px;background:var(--bg3);border:1px solid var(--br);
  border-radius:14px;padding:6px 6px 6px 14px;transition:border-color .2s;}
.irow:focus-within{border-color:var(--bra);}
#mi{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:14px;
  font-family:'Inter',sans-serif;resize:none;max-height:100px;min-height:22px;line-height:1.5;padding:2px 0;}
#mi::placeholder{color:var(--tm);}
.ibts{display:flex;gap:3px;align-items:center;}
.ibtn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;
  color:var(--tm);cursor:pointer;font-size:16px;transition:all .15s;
  display:flex;align-items:center;justify-content:center;}
.ibtn:hover{color:var(--t1);background:var(--bgh);}
.sbtn{width:36px;height:36px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;cursor:pointer;
  font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;box-shadow:0 4px 14px rgba(124,58,237,.4);}
.sbtn:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(124,58,237,.6);}

/* USERS */
.up{width:205px;background:var(--bg2);border-left:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;}
.uh{padding:16px 13px 9px;font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--tm);
  text-transform:uppercase;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:5px;}
.oc{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);
  padding:1px 5px;border-radius:10px;font-size:10px;margin-left:auto;}
#ul{flex:1;overflow-y:auto;padding:5px;}
.ui{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;transition:background .15s;}
.ui:hover{background:var(--bgh);}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;position:relative;flex-shrink:0;}
.usd{position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;
  background:#22c55e;border:2px solid var(--bg2);}
.uname{font-size:12px;font-weight:500;}
.utag{font-size:10px;color:var(--tm);}

/* EMOJI */
.ep{position:absolute;bottom:76px;left:20px;background:var(--bg2);border:1px solid var(--br);
  border-radius:14px;padding:9px;box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:100;display:none;width:280px;}
.ep.open{display:block;animation:pi .15s ease;}
@keyframes pi{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.ecats{display:flex;gap:2px;margin-bottom:6px;overflow-x:auto;padding-bottom:2px;}
.ec{padding:3px 6px;border-radius:6px;border:none;cursor:pointer;background:transparent;font-size:14px;transition:background .15s;}
.ec:hover,.ec.act{background:var(--bgh);}
.egrid{display:grid;grid-template-columns:repeat(8,1fr);gap:1px;max-height:160px;overflow-y:auto;}
.eb{padding:4px;border-radius:5px;border:none;cursor:pointer;background:transparent;font-size:16px;transition:all .15s;text-align:center;}
.eb:hover{background:var(--bgh);transform:scale(1.2);}

/* REACTION PICKER */
.rpick{position:fixed;background:var(--bg2);border:1px solid var(--br);border-radius:40px;
  padding:5px 8px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;display:flex;gap:3px;animation:pi .15s ease;}
.re{font-size:20px;cursor:pointer;padding:4px;border-radius:50%;transition:all .15s;border:none;background:transparent;}
.re:hover{transform:scale(1.4);background:var(--bgh);}

#lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
#lb.open{display:flex;}
#lb img{max-width:90vw;max-height:90vh;border-radius:12px;}
#tc{position:fixed;top:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:9999;}
.toast{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:10px 14px;
  font-size:13px;min-width:190px;box-shadow:0 8px 24px rgba(0,0,0,.4);
  animation:sir .3s ease;display:flex;align-items:center;gap:8px;}
@keyframes sir{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
#scb{position:absolute;bottom:90px;right:22px;width:36px;height:36px;border-radius:50%;
  background:var(--ac);border:none;color:#fff;font-size:16px;cursor:pointer;display:none;
  align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(124,58,237,.5);z-index:50;}
#scb:hover{transform:scale(1.1);}
#fi{display:none;}
@media(max-width:680px){.up{display:none;}.sb{width:210px;}}
@media(max-width:480px){.sb{display:none;}}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="logo">⚡</div>
    <div class="title">NeonChat</div>
    <p class="sub">Real-time messaging — works across any device</p>
    <div class="avpick" id="avpick"></div>
    <input class="inp" id="uinp" placeholder="Pick a username..." maxlength="20" autocomplete="off">
    <input class="inp" id="rinp" placeholder="Room name (share this to chat together)" autocomplete="off">
    <button class="btn" onclick="join()">✦ Join Chat</button>
    <p class="hint">💡 Two people entering the same room name will be connected live</p>
  </div>
</div>

<div id="app">
<div class="layout">
  <nav class="sb">
    <div class="sb-head">
      <span style="font-size:19px;filter:drop-shadow(0 0 8px rgba(124,58,237,.8))">⚡</span>
      <span class="brand">NeonChat</span>
      <div class="cdot"><div class="dot" id="dot"></div><span id="clbl">Live</span></div>
    </div>
    <div class="rl">📡 Channels</div>
    <div id="rlist"></div>
    <div class="nr">
      <div style="font-size:10px;font-weight:600;letter-spacing:1px;color:var(--tm);text-transform:uppercase;margin-bottom:6px;">+ New Channel</div>
      <div class="nr-row"><input id="nri" placeholder="channel name"><button onclick="createRoom()">+</button></div>
    </div>
    <div class="sf"><div class="uself" id="uself"></div></div>
  </nav>

  <div class="chat">
    <div class="ch">
      <span id="chico" style="font-size:20px;">💬</span>
      <div><div class="ch-name" id="chname">general</div><div class="ch-desc" id="chdesc">Say hello 👋</div></div>
      <div class="hact">
        <button class="hbtn" onclick="copyInvite()" title="Copy invite link">🔗</button>
        <button class="hbtn" onclick="toggleSound()" id="sndbtn">🔔</button>
        <button class="hbtn" onclick="toggleUsers()">👥</button>
      </div>
    </div>
    <div id="msgs"></div>
    <button id="scb" onclick="scrollBot()">↓</button>
    <div id="tybar"></div>
    <div class="ia">
      <div class="irow">
        <textarea id="mi" rows="1" placeholder="Message #general..." onkeydown="kd(event)" oninput="oi(this)"></textarea>
        <div class="ibts">
          <button class="ibtn" onclick="toggleEmoji()">😊</button>
          <button class="ibtn" onclick="document.getElementById('fi').click()">📎</button>
          <button class="sbtn" onclick="send()">➤</button>
        </div>
      </div>
    </div>
    <div class="ep" id="ep"><div class="ecats" id="ecats"></div><div class="egrid" id="egrid"></div></div>
  </div>

  <div class="up" id="up">
    <div class="uh">Online<span class="oc" id="oc">1</span></div>
    <div id="ul"></div>
  </div>
</div>
</div>

<div id="lb" onclick="closeLB()"><img id="lbimg" src="" alt=""></div>
<div id="tc"></div>
<input type="file" id="fi" accept="image/*" onchange="handleFile(event)">

<script>
const EMOJI = {
  '😊':['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','😊','😇','🥰','😍','🤩','😘','😋','😛','😜','🤪','🤑','🤗','🤔','😐','😶','😏','😒','🙄','😬','😔','🥴','😵','🤡','💀'],
  '👍':['👍','👎','👏','🙌','🤝','👊','✊','🤛','🤜','🤞','✌️','🤘','👌','🤌','👈','👉','👆','✋','🖐','🖖','👋','🤙','💪'],
  '❤️':['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💔','❣️','💕','💞','💓','💗','💖','💘','💝','🔥','✨','💯'],
  '🐶':['🐶','🐱','🐭','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🙈','🙉','🙊','🐔','🐧','🦆','🦅','🦉','🐺','🦄','🐉','🦕'],
  '🍕':['🍕','🍔','🌭','🌮','🌯','🍣','🍜','🍝','🍲','🥗','🍱','🍩','🎂','🍰','🧁','🍫','🍬','🍭','🥤','☕','🧋'],
  '⚽':['⚽','🏀','🏈','⚾','🎾','🏐','🎱','🎮','🕹️','🎯','🎲','🏆','🥇','🎬','🎵','🎶','🎸','🎹','🥁'],
  '✈️':['✈️','🚀','🛸','🚁','⛵','🚢','🚂','🚗','🚙','🏎️','🚲','🛴','🛵','🌍','🌙','⭐','☀️','⛅','🌈','❄️','🌊'],
  '💻':['💻','🖥️','📱','📲','📺','📷','📸','🎥','🔭','🔬','🔋','💡','📝','💰','💳','🔑','🏠','🎁','🎉','🎊'],
};
const RICONS = {general:'💬',gaming:'🎮',music:'🎵',random:'🎲',tech:'💻',art:'🎨'};
const QREACT = ['❤️','😂','😮','😢','👍','🔥'];
const AVS = [
  {e:'🦊',b:'#7c3aed'},{e:'🐺',b:'#06b6d4'},{e:'🐱',b:'#f59e0b'},
  {e:'🐻',b:'#10b981'},{e:'🦁',b:'#ef4444'},{e:'🐼',b:'#ec4899'},
  {e:'🦋',b:'#8b5cf6'},{e:'🐬',b:'#3b82f6'},
];

const S = {
  name:'',av:AVS[0],room:'general',
  rooms:['general','gaming','music','random'],
  users:{},msgs:{},typing:{},
  tyto:null,snd:true,emopen:false,emcat:'😊',
  id:'u'+Math.random().toString(36).slice(2,10),
  rpick:null,pn:null,
};

// ── LOGIN ──────────────────────────────────────────────────
function initLogin(){
  const p=document.getElementById('avpick');
  AVS.forEach((av,i)=>{
    const el=document.createElement('div');
    el.className='avo'+(i===0?' sel':'');
    el.style.background=av.b; el.textContent=av.e;
    el.onclick=()=>{document.querySelectorAll('.avo').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');S.av=av;};
    p.appendChild(el);
  });
  document.getElementById('uinp').addEventListener('keydown',e=>{if(e.key==='Enter')join();});
  document.getElementById('rinp').addEventListener('keydown',e=>{if(e.key==='Enter')join();});

  // prefill room from URL
  const r=new URLSearchParams(location.search).get('room');
  if(r) document.getElementById('rinp').value=r;
  document.getElementById('uinp').focus();
}

function join(){
  let name=document.getElementById('uinp').value.trim()||'Guest'+Math.floor(Math.random()*999);
  let room=(document.getElementById('rinp').value.trim()||'general').toLowerCase().replace(/\s+/g,'-');
  S.name=name; S.room=room;
  if(!S.rooms.includes(room)) S.rooms.push(room);

  const ls=document.getElementById('login');
  ls.style.transition='opacity .35s'; ls.style.opacity='0';
  setTimeout(()=>{ls.style.display='none'; document.getElementById('app').style.display='block'; initApp();},350);
}

// ── APP INIT ───────────────────────────────────────────────
function initApp(){
  renderRooms(); renderSelf(); initEmoji(); initPubNub();
  switchRoom(S.room);

  const msgs=document.getElementById('msgs');
  msgs.addEventListener('scroll',()=>{
    const btn=document.getElementById('scb');
    btn.style.display=(msgs.scrollHeight-msgs.scrollTop-msgs.clientHeight>120)?'flex':'none';
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('.ep')&&!e.target.closest('.ibtn'))closeEmoji();
    if(S.rpick&&!e.target.closest('.rpick')&&!e.target.closest('.rbtn')){S.rpick.remove();S.rpick=null;}
  });
}

// ── PUBNUB ────────────────────────────────────────────────
function initPubNub(){
  S.pn=new PubNub({
    publishKey:'pub-c-a4c0a89f-f487-4df2-b6a0-c4c23b31e06f',
    subscribeKey:'sub-c-a0e6a5f0-e543-11e5-abcd-0619f8945a4f',
    uuid:S.id,
  });
  S.pn.addListener({
    message:({message:m})=>{
      if(m.room!==S.room) return;
      handleMsg(m);
    },
    presence:({action,uuid,state:ps})=>{
      if(action==='join'&&ps) updateUser(uuid,ps);
      if(action==='leave'||action==='timeout') removeUser(uuid);
    },
    status:({category})=>{
      const on=category==='PNConnectedCategory'||category==='PNReconnectedCategory';
      setConn(on);
      if(on){broadcastPresence();addSys('Connected ✦ Real-time is live');}
    }
  });
  subscribe();
}

function subscribe(){
  S.pn.subscribe({channels:['neonchat.'+S.room],withPresence:true});
}

function pub(data){
  return S.pn.publish({channel:'neonchat.'+S.room, message:{...data,room:S.room}});
}

function broadcastPresence(){
  S.pn.setState({state:{name:S.name,av:S.av},channels:['neonchat.'+S.room]});
  updateUser(S.id,{name:S.name,av:S.av});

  // Also fetch who's already here
  S.pn.hereNow({channels:['neonchat.'+S.room],includeState:true}).then(r=>{
    const ch=r.channels['neonchat.'+S.room];
    if(ch&&ch.occupants) ch.occupants.forEach(o=>{if(o.state)updateUser(o.uuid,o.state);});
  });
}

function handleMsg(m){
  if(m.type==='msg'){
    if(m.sender===S.id) return; // already shown
    appendMsg(m,false); playSound('recv');
    if(document.hidden) toast(m.av.e+' '+m.name, m.text||'📷 Image');
  }
  if(m.type==='typing'&&m.sender!==S.id) updateTyping(m);
  if(m.type==='react'&&m.sender!==S.id) applyReact(m);
}

// ── ROOMS ─────────────────────────────────────────────────
function renderRooms(){
  const l=document.getElementById('rlist'); l.innerHTML='';
  S.rooms.forEach(r=>{
    const ic=RICONS[r]||'💬';
    const el=document.createElement('div');
    el.className='ri'+(r===S.room?' active':'');
    el.innerHTML=`<span style="font-size:14px;">${ic}</span><span>${r}</span>`;
    el.onclick=()=>switchRoom(r);
    l.appendChild(el);
  });
}

function switchRoom(r){
  // Unsubscribe old
  S.pn&&S.pn.unsubscribe({channels:['neonchat.'+S.room]});
  S.room=r; S.users={}; S.typing={};
  document.getElementById('msgs').innerHTML='';
  document.getElementById('chname').textContent='#'+r;
  document.getElementById('chdesc').textContent=(RICONS[r]||'💬')+' Welcome to #'+r;
  document.getElementById('chico').textContent=RICONS[r]||'💬';
  document.getElementById('mi').placeholder='Message #'+r+'...';
  if(!S.msgs[r]) S.msgs[r]=[];
  S.msgs[r].forEach(m=>appendMsg(m,m.sender===S.id));
  renderRooms(); renderUsers();
  subscribe();
  setTimeout(broadcastPresence,500);
}

function createRoom(){
  const inp=document.getElementById('nri');
  const name=inp.value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name||S.rooms.includes(name)) return;
  S.rooms.push(name); inp.value='';
  renderRooms(); switchRoom(name);
}

// ── MESSAGES ──────────────────────────────────────────────
function send(){
  const inp=document.getElementById('mi');
  const text=inp.value.trim(); if(!text) return;
  const m={type:'msg',id:Date.now()+S.id,sender:S.id,name:S.name,av:S.av,text,ts:Date.now(),react:{}};
  pub(m);
  appendMsg(m,true); storeMsg(m); playSound('send');
  inp.value=''; inp.style.height='auto'; clearTyping();
}

function appendMsg(m,own){
  const box=document.getElementById('msgs');
  const atBot=box.scrollHeight-box.scrollTop-box.clientHeight<160;

  const g=document.createElement('div');
  g.className='mg'+(own?' own':''); g.dataset.id=m.id;

  const sr=document.createElement('div'); sr.className='sr';
  sr.innerHTML=`<div class="mav" style="background:${m.av.b}">${m.av.e}</div>
    <span class="mun">${esc(m.name)}</span><span class="mt">${fmtTime(m.ts)}</span>`;
  g.appendChild(sr);

  const mb=document.createElement('div'); mb.className='mb';
  if(m.img){const i=document.createElement('img');i.src=m.img;i.className='mimg';i.onclick=()=>openLB(m.img);mb.appendChild(i);}
  if(m.text){const p=document.createElement('p');p.textContent=m.text;mb.appendChild(p);}

  const rb=document.createElement('button'); rb.className='rbtn'; rb.textContent='😊';
  rb.onclick=e=>{e.stopPropagation();showRPick(e,m.id,g);};
  mb.appendChild(rb); g.appendChild(mb);

  const ra=document.createElement('div'); ra.className='mreact'; ra.id='ra-'+m.id;
  if(m.react) renderReacts(ra,m.react,m.id);
  g.appendChild(ra);

  box.appendChild(g);
  if(atBot) scrollBot();
}

function storeMsg(m){
  if(!S.msgs[S.room]) S.msgs[S.room]=[];
  S.msgs[S.room].push(m);
  if(S.msgs[S.room].length>300) S.msgs[S.room].shift();
}

function addSys(t){
  const box=document.getElementById('msgs');
  const el=document.createElement('div'); el.className='msys'; el.textContent=t;
  box.appendChild(el); scrollBot();
}

// ── REACTIONS ─────────────────────────────────────────────
function showRPick(e,mid,g){
  if(S.rpick) S.rpick.remove();
  const pick=document.createElement('div'); pick.className='rpick';
  QREACT.forEach(em=>{
    const b=document.createElement('button'); b.className='re'; b.textContent=em;
    b.onclick=()=>{sendReact(mid,em);pick.remove();S.rpick=null;};
    pick.appendChild(b);
  });
  const rect=e.target.getBoundingClientRect();
  pick.style.top=(rect.top-52)+'px';
  pick.style.left=Math.min(rect.left-60,window.innerWidth-230)+'px';
  document.body.appendChild(pick); S.rpick=pick; e.stopPropagation();
}

function sendReact(mid,em){
  const d={type:'react',sender:S.id,mid,em};
  pub(d); applyReact(d);
}

function applyReact(d){
  const area=document.getElementById('ra-'+d.mid); if(!area) return;
  let msg=null;
  for(const arr of Object.values(S.msgs)){const f=arr.find(m=>m.id===d.mid);if(f){msg=f;break;}}
  if(!msg) return;
  if(!msg.react) msg.react={};
  if(!msg.react[d.em]) msg.react[d.em]=[];
  const arr=msg.react[d.em];
  const i=arr.indexOf(d.sender);
  if(i>-1) arr.splice(i,1); else arr.push(d.sender);
  renderReacts(area,msg.react,d.mid);
}

function renderReacts(area,react,mid){
  area.innerHTML='';
  Object.entries(react).forEach(([em,who])=>{
    if(!who.length) return;
    const mine=who.includes(S.id);
    const c=document.createElement('button'); c.className='rc'+(mine?' me':'');
    c.innerHTML=`${em}<span class="rcn">${who.length}</span>`;
    c.onclick=()=>sendReact(mid,em);
    area.appendChild(c);
  });
}

// ── TYPING ────────────────────────────────────────────────
function handleTyping(){
  pub({type:'typing',sender:S.id,name:S.name,on:true});
  clearTimeout(S.tyto);
  S.tyto=setTimeout(clearTyping,2500);
}

function clearTyping(){
  pub({type:'typing',sender:S.id,name:S.name,on:false});
}

function updateTyping(m){
  if(m.on) S.typing[m.sender]=m.name; else delete S.typing[m.sender];
  renderTyping();
}

function renderTyping(){
  const bar=document.getElementById('tybar');
  const names=Object.values(S.typing);
  if(!names.length){bar.innerHTML='';return;}
  const t=names.length===1?`${names[0]} is typing`:names.length===2?`${names[0]} and ${names[1]} are typing`:`${names.length} people are typing`;
  bar.innerHTML=`<div class="tdots"><span></span><span></span><span></span></div><span>${esc(t)}</span>`;
}

// ── PRESENCE ──────────────────────────────────────────────
function updateUser(id,st){
  S.users[id]={name:st.name||'?',av:st.av||AVS[0]};
  renderUsers();
}
function removeUser(id){delete S.users[id];renderUsers();}
function renderUsers(){
  const l=document.getElementById('ul'); l.innerHTML='';
  const cnt=Object.keys(S.users).length;
  document.getElementById('oc').textContent=cnt;
  Object.entries(S.users).forEach(([id,u])=>{
    const me=id===S.id;
    const el=document.createElement('div'); el.className='ui';
    el.innerHTML=`<div class="uav" style="background:${u.av.b}">${u.av.e}<div class="usd"></div></div>
      <div><div class="uname">${esc(u.name)}</div>${me?'<div class="utag">You</div>':''}</div>`;
    l.appendChild(el);
  });
}

// ── FILE ──────────────────────────────────────────────────
function handleFile(ev){
  const f=ev.target.files[0]; if(!f||!f.type.startsWith('image/')) return;
  if(f.size>1.5*1024*1024){toast('⚠️ Too large','Max 1.5 MB');return;}
  const r=new FileReader();
  r.onload=e=>{
    const m={type:'msg',id:Date.now()+S.id,sender:S.id,name:S.name,av:S.av,img:e.target.result,text:'',ts:Date.now(),react:{}};
    pub(m); appendMsg(m,true); storeMsg(m); playSound('send');
  };
  r.readAsDataURL(f); ev.target.value='';
}

// ── EMOJI ─────────────────────────────────────────────────
function initEmoji(){
  const cats=document.getElementById('ecats');
  Object.keys(EMOJI).forEach(c=>{
    const b=document.createElement('button'); b.className='ec'+(c===S.emcat?' act':'');
    b.textContent=c;
    b.onclick=()=>{document.querySelectorAll('.ec').forEach(x=>x.classList.remove('act'));b.classList.add('act');S.emcat=c;renderEGrid();};
    cats.appendChild(b);
  });
  renderEGrid();
}
function renderEGrid(){
  const g=document.getElementById('egrid'); g.innerHTML='';
  (EMOJI[S.emcat]||[]).forEach(em=>{
    const b=document.createElement('button'); b.className='eb'; b.textContent=em;
    b.onclick=()=>insEmoji(em);
    g.appendChild(b);
  });
}
function insEmoji(em){
  const inp=document.getElementById('mi');
  const s=inp.selectionStart,e=inp.selectionEnd;
  inp.value=inp.value.slice(0,s)+em+inp.value.slice(e);
  inp.selectionStart=inp.selectionEnd=s+em.length;
  inp.focus();
}
function toggleEmoji(){S.emopen=!S.emopen;document.getElementById('ep').classList.toggle('open',S.emopen);}
function closeEmoji(){S.emopen=false;document.getElementById('ep').classList.remove('open');}

// ── SOUND ─────────────────────────────────────────────────
let actx;
function playSound(type){
  if(!S.snd) return;
  try{
    if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    if(type==='send'){o.frequency.setValueAtTime(880,actx.currentTime);o.frequency.exponentialRampToValueAtTime(1200,actx.currentTime+.09);}
    else{o.frequency.setValueAtTime(440,actx.currentTime);o.frequency.exponentialRampToValueAtTime(660,actx.currentTime+.12);}
    g.gain.setValueAtTime(.07,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.18);
    o.start(actx.currentTime);o.stop(actx.currentTime+.18);
  }catch(e){}
}
function toggleSound(){S.snd=!S.snd;document.getElementById('sndbtn').textContent=S.snd?'🔔':'🔕';toast('Sound '+(S.snd?'on 🔔':'off 🔕'),'');}

// ── MISC UI ───────────────────────────────────────────────
function setConn(on){
  document.getElementById('dot').classList.toggle('off',!on);
  document.getElementById('clbl').textContent=on?'Live':'Reconnecting...';
}
function renderSelf(){
  document.getElementById('uself').innerHTML=`
    <div style="width:36px;height:36px;border-radius:50%;background:${S.av.b};display:flex;align-items:center;justify-content:center;font-size:17px;">${S.av.e}</div>
    <div><div class="uself-name">${esc(S.name)}</div><div class="uself-st">● Online</div></div>`;
}
function scrollBot(){const b=document.getElementById('msgs');b.scrollTop=b.scrollHeight;document.getElementById('scb').style.display='none';}
function copyInvite(){
  const url=location.origin+location.pathname+'?room='+encodeURIComponent(S.room);
  navigator.clipboard.writeText(url).catch(()=>{});
  toast('🔗 Link copied!','Share with friends to join '+S.room);
}
function toggleUsers(){const p=document.getElementById('up');p.style.display=p.style.display==='none'?'flex':'none';}
function openLB(src){document.getElementById('lbimg').src=src;document.getElementById('lb').classList.add('open');}
function closeLB(){document.getElementById('lb').classList.remove('open');}
function toast(title,msg){
  const c=document.getElementById('tc');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span style="font-size:18px">${title.split(' ')[0]}</span><div>
    <b style="font-size:13px">${esc(title.split(' ').slice(1).join(' ')||title)}</b>
    ${msg?`<div style="color:var(--tm);font-size:11px">${esc(msg)}</div>`:''}</div>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3200);
}
function kd(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function oi(el){handleTyping();el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.addEventListener('beforeunload',()=>{
  try{S.pn&&S.pn.unsubscribeAll();}catch(e){}
});

initLogin();
</script>
</body>
