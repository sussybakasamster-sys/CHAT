
<!DOCTYPE html>
<html lang="en">
<head><base href="https://d16ilfvy4mv02r.cloudfront.net/workspaces/dCBi9yFPoDythQuO8RpzcylbjO3YgVoX/64fa02ba-05d8-433e-9830-6dfc3965b9b3/files/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonChat — Real-Time Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-tertiary: #1a1a24;
    --bg-hover: #22223a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --accent-glow: rgba(124,58,237,0.3);
    --text-primary: #f0f0ff;
    --text-secondary: #9090b0;
    --text-muted: #5a5a7a;
    --border: rgba(255,255,255,0.07);
    --border-accent: rgba(124,58,237,0.4);
    --msg-sent: #7c3aed;
    --msg-recv: #1e1e2e;
    --radius: 16px;
    --sidebar-w: 280px;
    --users-w: 220px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 4px; }

  /* ══════════════════════════════════════════
     LOGIN SCREEN
  ══════════════════════════════════════════ */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg-primary);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 60%);
  }

  .login-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 400px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 60px rgba(124,58,237,0.08);
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    font-size: 48px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(124,58,237,0.8));
  }

  .login-title {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #22d3ee);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .login-sub {
    color: var(--text-muted); font-size: 14px; margin-bottom: 32px;
  }

  .avatar-picker {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .av-opt {
    width: 44px; height: 44px; border-radius: 50%;
    cursor: pointer; border: 3px solid transparent;
    transition: all 0.2s; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .av-opt:hover { transform: scale(1.15); }
  .av-opt.selected { border-color: white; transform: scale(1.2); box-shadow: 0 0 16px currentColor; }

  .login-input {
    width: 100%; padding: 14px 18px;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-primary); font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none; margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: var(--text-muted); }

  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    border: none; border-radius: 12px;
    color: white; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 8px 24px rgba(124,58,237,0.35);
    margin-top: 8px;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.5); }
  .login-btn:active { transform: translateY(0); }

  /* ══════════════════════════════════════════
     MAIN LAYOUT
  ══════════════════════════════════════════ */
  #app {
    display: none; width: 100%; height: 100vh;
    flex-direction: row;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }

  .brand {
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #22d3ee);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .brand-icon { font-size: 22px; filter: drop-shadow(0 0 8px rgba(124,58,237,0.8)); }

  .conn-badge {
    margin-left: auto;
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-muted);
  }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse 2s infinite;
  }
  .conn-dot.offline { background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  .rooms-label {
    padding: 16px 20px 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--text-muted); text-transform: uppercase;
  }

  .room-item {
    margin: 2px 10px;
    padding: 10px 14px; border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: all 0.15s; position: relative;
    color: var(--text-secondary); font-size: 14px; font-weight: 500;
  }
  .room-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .room-item.active {
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(6,182,212,0.1));
    color: white; border: 1px solid var(--border-accent);
  }
  .room-icon { font-size: 16px; width: 20px; text-align: center; }
  .room-notif {
    margin-left: auto; background: var(--accent);
    color: white; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center;
  }

  .sidebar-footer {
    margin-top: auto; padding: 16px;
    border-top: 1px solid var(--border);
  }

  .user-self {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 10px;
    background: var(--bg-tertiary);
  }
  .user-self-name { font-size: 14px; font-weight: 600; }
  .user-self-status { font-size: 11px; color: var(--text-muted); }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; position: relative;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
  }

  .chat-header-icon { font-size: 22px; }
  .chat-header-name { font-size: 16px; font-weight: 700; }
  .chat-header-desc { font-size: 12px; color: var(--text-muted); }

  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .header-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    color: var(--text-secondary); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 4px;
    scroll-behavior: smooth;
  }

  .msg-group { display: flex; flex-direction: column; gap: 3px; margin: 6px 0; }
  .msg-group.own { align-items: flex-end; }

  .msg-sender-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }
  .msg-group.own .msg-sender-row { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .msg-username { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .msg-time { font-size: 11px; color: var(--text-muted); }

  .msg-bubble {
    max-width: 520px; padding: 10px 16px;
    border-radius: 18px; font-size: 14px; line-height: 1.55;
    position: relative; word-wrap: break-word;
    transition: transform 0.1s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .msg-bubble:hover { transform: scale(1.01); }

  .msg-group.own .msg-bubble {
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white; border-bottom-right-radius: 6px;
  }
  .msg-group:not(.own) .msg-bubble {
    background: var(--msg-recv);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }

  .msg-image { max-width: 300px; border-radius: 12px; cursor: zoom-in; margin-top: 4px; }

  .msg-reactions {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
  }
  .reaction-chip {
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 8px; font-size: 13px;
    cursor: pointer; transition: all 0.15s; display: flex; gap: 4px; align-items: center;
  }
  .reaction-chip:hover { background: var(--bg-hover); transform: scale(1.1); }
  .reaction-chip.mine { border-color: var(--accent); background: rgba(124,58,237,0.15); }
  .reaction-count { font-size: 11px; color: var(--text-muted); font-weight: 600; }

  .react-btn {
    opacity: 0; transition: opacity 0.2s;
    position: absolute; right: -36px; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .msg-group.own .react-btn { right: auto; left: -36px; }
  .msg-bubble:hover .react-btn { opacity: 1; }

  /* System messages */
  .msg-system {
    text-align: center; padding: 6px 0;
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .msg-system::before,.msg-system::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* Typing indicator */
  #typing-bar {
    padding: 6px 24px; min-height: 26px;
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-muted); animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)} }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--border-accent); }

  #msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-primary); font-size: 14px; font-family: 'Inter', sans-serif;
    resize: none; max-height: 120px; min-height: 22px; line-height: 1.5;
    padding: 3px 0;
  }
  #msg-input::placeholder { color: var(--text-muted); }

  .input-actions { display: flex; gap: 4px; align-items: center; }

  .input-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none;
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-size: 18px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .input-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

  .send-btn {
    width: 40px; height: 40px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    color: white; cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(124,58,237,0.4);
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(124,58,237,0.6); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── USERS PANEL ── */
  .users-panel {
    width: var(--users-w);
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .users-header {
    padding: 20px 16px 12px;
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--text-muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .online-count {
    background: rgba(34,197,94,0.15); color: #22c55e;
    border: 1px solid rgba(34,197,94,0.3);
    padding: 1px 6px; border-radius: 10px; font-size: 10px;
    margin-left: auto;
  }

  #users-list {
    flex: 1; overflow-y: auto; padding: 8px;
  }

  .user-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 10px;
    transition: background 0.15s; cursor: pointer;
  }
  .user-item:hover { background: var(--bg-hover); }

  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; position: relative; flex-shrink: 0;
  }
  .user-status-dot {
    position: absolute; bottom: 0; right: 0;
    width: 9px; height: 9px; border-radius: 50%;
    background: #22c55e; border: 2px solid var(--bg-secondary);
  }
  .user-name-text { font-size: 13px; font-weight: 500; }
  .user-name-you { font-size: 10px; color: var(--text-muted); }

  /* ── EMOJI PICKER ── */
  .emoji-picker {
    position: absolute; bottom: 90px; left: 24px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    z-index: 100; display: none;
    width: 300px;
  }
  .emoji-picker.open { display: block; animation: popIn 0.15s ease; }
  @keyframes popIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

  .emoji-cats { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
  .emoji-cat-btn {
    padding: 4px 8px; border-radius: 8px; border: none; cursor: pointer;
    background: transparent; font-size: 16px; transition: background 0.15s;
  }
  .emoji-cat-btn:hover, .emoji-cat-btn.active { background: var(--bg-hover); }

  .emoji-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px;
    max-height: 180px; overflow-y: auto;
  }
  .emoji-btn {
    padding: 6px; border-radius: 6px; border: none; cursor: pointer;
    background: transparent; font-size: 18px; transition: background 0.15s;
    text-align: center;
  }
  .emoji-btn:hover { background: var(--bg-hover); transform: scale(1.2); }

  /* ── REACTION PICKER ── */
  .reaction-picker {
    position: absolute; background: var(--bg-secondary);
    border: 1px solid var(--border); border-radius: 40px;
    padding: 6px 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 200; display: flex; gap: 4px;
    animation: popIn 0.15s ease;
  }
  .react-emoji {
    font-size: 20px; cursor: pointer; padding: 4px 5px; border-radius: 50%;
    transition: all 0.15s; border: none; background: transparent;
  }
  .react-emoji:hover { transform: scale(1.4); background: var(--bg-hover); }

  /* ── IMAGE LIGHTBOX ── */
  #lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    z-index: 999; display: none; align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }

  /* ── NOTIFICATION TOAST ── */
  #toast-container {
    position: fixed; top: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; z-index: 9999;
  }
  .toast {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    font-size: 13px; min-width: 220px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: slideInRight 0.3s ease;
    display: flex; align-items: center; gap: 10px;
  }
  @keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

  /* ── FILE INPUT ── */
  #file-input { display: none; }

  /* ── MOBILE RESPONSIVENESS ── */
  @media (max-width: 768px) {
    .sidebar { width: 220px; }
    .users-panel { display: none; }
    :root { --sidebar-w: 220px; }
  }
  @media (max-width: 540px) {
    .sidebar { display: none; }
    #app.mobile-sidebar .sidebar { display: flex; position: fixed; inset: 0; z-index: 500; width: 280px; }
  }

  /* Glow effects */
  .glow-purple { box-shadow: 0 0 20px rgba(124,58,237,0.3); }
  .glow-cyan   { box-shadow: 0 0 20px rgba(6,182,212,0.3); }

  /* Scroll to bottom btn */
  #scroll-btn {
    position: absolute; bottom: 100px; right: 30px;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; color: white;
    font-size: 18px; cursor: pointer; display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(124,58,237,0.5);
    z-index: 50; transition: all 0.2s;
  }
  #scroll-btn:hover { transform: scale(1.1); }

  /* Unread badge on room */
  .unread-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); margin-left: auto;
    box-shadow: 0 0 6px var(--accent);
  }
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚡</div>
    <div class="login-title">NeonChat</div>
    <p class="login-sub">Real-time messaging, beautifully dark.</p>

    <div class="avatar-picker" id="avatar-picker">
      <!-- Populated by JS -->
    </div>

    <input class="login-input" id="username-input" placeholder="Choose a username..." maxlength="20" autocomplete="off">
    <input class="login-input" id="room-input" placeholder="Room name (default: general)" autocomplete="off">
    <button class="login-btn" onclick="joinChat()">✦ Enter the Chat</button>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <span class="brand-icon">⚡</span>
      <span class="brand">NeonChat</span>
      <div class="conn-badge">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">Live</span>
      </div>
    </div>

    <div class="rooms-label">📡 Channels</div>
    <div id="rooms-list"></div>

    <div style="padding: 16px 20px 8px; margin-top: 8px;">
      <div class="rooms-label" style="padding: 0; margin-bottom: 8px;">🔒 Create Room</div>
      <div style="display:flex;gap:6px;">
        <input id="new-room-input" class="login-input" style="margin:0;font-size:13px;padding:8px 12px;" placeholder="room name...">
        <button onclick="createRoom()" style="padding:8px 12px;border-radius:10px;background:var(--accent);border:none;color:white;cursor:pointer;font-size:14px;">+</button>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="user-self" id="user-self-display"></div>
    </div>
  </nav>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="chat-header" id="chat-header">
      <span class="chat-header-icon" id="ch-icon">#</span>
      <div>
        <div class="chat-header-name" id="ch-name">general</div>
        <div class="chat-header-desc" id="ch-desc">Welcome! Say hello 👋</div>
      </div>
      <div class="header-actions">
        <button class="header-btn" title="Invite" onclick="copyInvite()">🔗</button>
        <button class="header-btn" title="Toggle sound" onclick="toggleSound()" id="sound-btn">🔔</button>
        <button class="header-btn" title="Users" onclick="toggleUsersPanel()">👥</button>
      </div>
    </div>

<script>
// ══════════════════════════════════════════
//  CONFIG & STATE
// ══════════════════════════════════════════
const EMOJI_DATA = {

  '❤️': ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟','♥️','❤️‍🔥','❤️‍🩹'],

  '🍕': ['🍕','🍔','🌭','🌮','🌯','🥙','🧆','🥚','🍳','🥘','🍲','🥗','🥣','🥫','🧂','🧇','🥞','🧈','🍞','🥐','🥖','🥨','🧀','🥪','🥙','🧆','🍱','🍘','🍙','🍚','🍛','🍜','🍝','🍠','🍢','🍣','🍤','🍥','🥮','🍡','🍦','🍧','🍨','🍩','🍪','🎂','🍰','🧁','🥧','🍫','🍬','🍭','🍮'],

  '🎵': ['🎵','🎶','🎸','🎹','🎺','🎻','🥁','🪘','🎷','🎤','🎧','🎼','🎙️','📻','📯'],
  '✈️': ['✈️','🚀','🛸','🚁','⛵','🚢','🚂','🚃','🚄','🚅','🚇','🚊','🚝','🚞','🛤️','🚘','🚗','🚙','🏎️','🚓','🚑','🚒','🛵','🏍️','🚲','🛴','🛹','🛼','🚏','🗺️','🧭'],
  '💻': ['💻','🖥️','🖨️','⌨️','🖱️','📱','📲','☎️','📞','📟','📠','📺','📷','📸','📹','🎥','📡','🔭','🔬','🧪','🧫','🔋','🔌','💡','🔦','🕯️','💰','💳','📝','📋','🗒️','📌','📍'],
};

const ROOM_ICONS = { general:'💬', gaming:'🎮', music:'🎵', random:'🎲', tech:'💻', art:'🎨' };
const QUICK_REACTIONS = ['❤️','😂','😮','😢','😡','👍'];
const COLORS = ['#7c3aed','#06b6d4','#f59e0b','#10b981','#ef4444','#ec4899','#8b5cf6','#3b82f6'];
const AVATARS = [
  { emoji: '🦊', bg: '#7c3aed' },
  { emoji: '🐺', bg: '#06b6d4' },
  { emoji: '🐱', bg: '#f59e0b' },
  { emoji: '🐻', bg: '#10b981' },
  { emoji: '🦁', bg: '#ef4444' },
  { emoji: '🐼', bg: '#ec4899' },
  { emoji: '🦋', bg: '#8b5cf6' },
  { emoji: '🐬', bg: '#3b82f6' },
];

let state = {
  username: '',
  avatar: AVATARS[0],
  currentRoom: 'general',
  rooms: ['general','gaming','music','random','tech'],
  onlineUsers: {},
  messages: {},
  ws: null,
  typingTimeout: null,
  typingUsers: {},
  soundEnabled: true,
  emojiOpen: false,
  activeEmojiCat: '😊',
  myId: Math.random().toString(36).slice(2),
  reactionPickerEl: null,
};

// ══════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════
function initLogin() {
  const picker = document.getElementById('avatar-picker');
  AVATARS.forEach((av, i) => {
    const el = document.createElement('div');
    el.className = 'av-opt' + (i === 0 ? ' selected' : '');
    el.style.background = av.bg;
    el.textContent = av.emoji;
    el.onclick = () => {
      document.querySelectorAll('.av-opt').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      state.avatar = av;
    };
    picker.appendChild(el);
  });
  document.getElementById('username-input').focus();
  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });
}

function joinChat() {
  let username = document.getElementById('username-input').value.trim();
  if (!username) { username = 'Guest' + Math.floor(Math.random() * 1000); }
  let room = document.getElementById('room-input').value.trim().toLowerCase().replace(/\s+/g, '-') || 'general';
  state.username = username;
  if (!state.rooms.includes(room)) state.rooms.push(room);
  state.currentRoom = room;

  document.getElementById('login-screen').style.opacity = '0';
  document.getElementById('login-screen').style.transition = 'opacity 0.4s';
  setTimeout(() => {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  }, 400);
}

// ══════════════════════════════════════════
//  APP INIT
// ══════════════════════════════════════════
function initApp() {
  renderRooms();
  renderUserSelf();
  initEmoji();
  connectWebSocket();
  switchRoom(state.currentRoom);

  // Scroll observer
  const msgs = document.getElementById('messages');
  msgs.addEventListener('scroll', () => {
    const btn = document.getElementById('scroll-btn');
    const atBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 100;
    btn.style.display = atBottom ? 'none' : 'flex';
  });

  // Close emoji on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#emoji-picker') && !e.target.closest('.input-btn')) {
      closeEmoji();
    }
    if (state.reactionPickerEl && !e.target.closest('.reaction-picker') && !e.target.closest('.react-btn')) {
      state.reactionPickerEl.remove();
      state.reactionPickerEl = null;
    }
  });
}

// ══════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════
function getWsUrl(room) {
  // PieSocket free public demo — shared channel per room
  const key = 'oCdCMcMPQpbvNjUIzqtvF1d89XGwmkKjZPAKktU5';
  return `wss://demo.piesocket.com/v3/neonchat-${encodeURIComponent(room)}?api_key=${key}&notify_self=1`;
}

function connectWebSocket() {
  setConnStatus(false);
  if (state.ws) { state.ws.onclose = null; state.ws.close(); }

  try {
    const ws = new WebSocket(getWsUrl(state.currentRoom));
    state.ws = ws;

    ws.onopen = () => {
      setConnStatus(true);
      broadcastPresence();
      addSystemMsg(`You joined #${state.currentRoom}`);
    };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        handleIncoming(data);
      } catch(_) {}
    };

    ws.onclose = () => {
      setConnStatus(false);
      // Auto-reconnect after 3s
      setTimeout(() => { if (state.currentRoom) connectWebSocket(); }, 3000);
    };

    ws.onerror = () => setConnStatus(false);
  } catch(err) {
    setConnStatus(false);
    // Fall back to BroadcastChannel for same-device
    useBroadcastChannel();
  }
}

function useBroadcastChannel() {
  if (state.bc) state.bc.close();
  state.bc = new BroadcastChannel(`neonchat-${state.currentRoom}`);
  state.bc.onmessage = e => handleIncoming(e.data);
  setConnStatus(true);
  addSystemMsg(`Connected (local mode) to #${state.currentRoom}`);
  broadcastPresence();
}

function broadcast(data) {
  const json = JSON.stringify(data);
  if (state.ws && state.ws.readyState === WebSocket.OPEN) {
    state.ws.send(json);
  } else if (state.bc) {
    state.bc.postMessage(data);
  }
}

function handleIncoming(data) {
  if (!data || !data.type) return;
  switch (data.type) {
    case 'message':
      if (data.senderId !== state.myId) {
        appendMessage(data, false);
        playSound('recv');
        if (document.hidden) showToast(data.avatar.emoji + ' ' + data.username, data.text || '📷 Image');
      }
      break;
    case 'typing':
      if (data.senderId !== state.myId) updateTyping(data);
      break;
    case 'presence':
      if (data.senderId !== state.myId) updateOnlineUser(data);
      break;
    case 'reaction':
      if (data.senderId !== state.myId) applyReaction(data);
      break;
    case 'leave':
      removeUser(data.senderId);
      break;
  }
}

// ══════════════════════════════════════════
//  PRESENCE
// ══════════════════════════════════════════
function broadcastPresence() {
  const payload = {
    type: 'presence',
    senderId: state.myId,
    username: state.username,
    avatar: state.avatar,
  };
  broadcast(payload);
  updateOnlineUser(payload); // add self
  // Ping presence every 20s
  clearInterval(state.presenceInterval);
  state.presenceInterval = setInterval(() => broadcast(payload), 20000);
}

function updateOnlineUser(data) {
  state.onlineUsers[data.senderId] = { username: data.username, avatar: data.avatar };
  renderUsersList();
}

function removeUser(id) {
  delete state.onlineUsers[id];
  renderUsersList();
}

function renderUsersList() {
  const list = document.getElementById('users-list');
  const count = Object.keys(state.onlineUsers).length;
  document.getElementById('online-count').textContent = count;
  list.innerHTML = '';
  Object.entries(state.onlineUsers).forEach(([id, u]) => {
    const isMe = id === state.myId;
    const el = document.createElement('div');
    el.className = 'user-item';
    el.innerHTML = `
      <div class="user-avatar" style="background:${u.avatar.bg}">
        ${u.avatar.emoji}
        <div class="user-status-dot"></div>
      </div>
      <div>
        <div class="user-name-text">${escHtml(u.username)}</div>
        ${isMe ? '<div class="user-name-you">You</div>' : ''}
      </div>
    `;
    list.appendChild(el);
  });
}

// ══════════════════════════════════════════
//  ROOMS
// ══════════════════════════════════════════
function renderRooms() {
  const list = document.getElementById('rooms-list');
  list.innerHTML = '';
  state.rooms.forEach(room => {
    const icon = ROOM_ICONS[room] || '💬';
    const active = room === state.currentRoom;
    const el = document.createElement('div');
    el.className = `room-item${active ? ' active' : ''}`;
    el.innerHTML = `<span class="room-icon">${icon}</span><span>${room}</span>`;
    el.onclick = () => switchRoom(room);
    list.appendChild(el);
  });
}

function switchRoom(room) {
  // Disconnect from old room
  if (state.bc) { state.bc.close(); state.bc = null; }
  clearInterval(state.presenceInterval);

  state.currentRoom = room;
  state.onlineUsers = {};
  state.typingUsers = {};

  document.getElementById('ch-name').textContent = '#' + room;
  document.getElementById('ch-desc').textContent = (ROOM_ICONS[room] || '💬') + ' Welcome to #' + room;
  document.getElementById('ch-icon').textContent = ROOM_ICONS[room] || '#';
  document.getElementById('msg-input').placeholder = `Message #${room}...`;

  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';

  if (!state.messages[room]) state.messages[room] = [];
  state.messages[room].forEach(m => renderStoredMessage(m));

  renderRooms();
  renderUsersList();
  connectWebSocket();
}

function createRoom() {
  const input = document.getElementById('new-room-input');
  const name = input.value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!name || state.rooms.includes(name)) return;
  state.rooms.push(name);
  input.value = '';
  renderRooms();
  switchRoom(name);
}

// ══════════════════════════════════════════
//  MESSAGING
// ══════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  const msg = {
    type: 'message',
    id: Date.now() + '-' + state.myId,
    senderId: state.myId,
    username: state.username,
    avatar: state.avatar,
    text,
    timestamp: Date.now(),
    reactions: {},
  };

  broadcast(msg);
  appendMessage(msg, true);
  storeMessage(msg);
  playSound('send');

  input.value = '';
  input.style.height = 'auto';
  clearTyping();
}

function appendMessage(msg, isOwn) {
  const msgs = document.getElementById('messages');
  const atBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 150;

  const group = document.createElement('div');
  group.className = `msg-group ${isOwn ? 'own' : ''}`;
  group.dataset.msgId = msg.id;

  const senderRow = document.createElement('div');
  senderRow.className = 'msg-sender-row';
  senderRow.innerHTML = `
    <div class="msg-avatar" style="background:${msg.avatar.bg}">${msg.avatar.emoji}</div>
    <span class="msg-username">${escHtml(msg.username)}</span>
    <span class="msg-time">${formatTime(msg.timestamp)}</span>
  `;
  group.appendChild(senderRow);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (msg.image) {
    const img = document.createElement('img');
    img.src = msg.image;
    img.className = 'msg-image';
    img.onclick = () => openLightbox(msg.image);
    bubble.appendChild(img);
  }
  if (msg.text) {
    const p = document.createElement('p');
    p.textContent = msg.text;
    bubble.appendChild(p);
  }

  // React button
  const reactBtn = document.createElement('button');
  reactBtn.className = 'react-btn';
  reactBtn.textContent = '😊';
  reactBtn.onclick = (e) => { e.stopPropagation(); showReactionPicker(e, msg.id, group); };
  bubble.appendChild(reactBtn);

  group.appendChild(bubble);

  // Reactions area
  const reactArea = document.createElement('div');
  reactArea.className = 'msg-reactions';
  reactArea.id = `reactions-${msg.id}`;
  if (msg.reactions) renderReactions(reactArea, msg.reactions, msg.id);
  group.appendChild(reactArea);

  msgs.appendChild(group);

  if (atBottom) scrollToBottom();
}

function renderStoredMessage(msg) {
  appendMessage(msg, msg.senderId === state.myId);
}

function storeMessage(msg) {
  if (!state.messages[state.currentRoom]) state.messages[state.currentRoom] = [];
  state.messages[state.currentRoom].push(msg);
  // Keep last 200 messages
  if (state.messages[state.currentRoom].length > 200) {
    state.messages[state.currentRoom].shift();
  }
}

function addSystemMsg(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg-system';
  el.textContent = text;
  msgs.appendChild(el);
  scrollToBottom();
}

// ══════════════════════════════════════════
//  REACTIONS
// ══════════════════════════════════════════
function showReactionPicker(e, msgId, groupEl) {
  if (state.reactionPickerEl) state.reactionPickerEl.remove();

  const picker = document.createElement('div');
  picker.className = 'reaction-picker';
  QUICK_REACTIONS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'react-emoji';
    btn.textContent = emoji;
    btn.onclick = () => {
      sendReaction(msgId, emoji);
      picker.remove();
      state.reactionPickerEl = null;
    };
    picker.appendChild(btn);
  });

  // Position near cursor
  const rect = e.target.getBoundingClientRect();
  picker.style.position = 'fixed';
  picker.style.top = (rect.top - 50) + 'px';
  picker.style.left = Math.min(rect.left - 60, window.innerWidth - 220) + 'px';
  document.body.appendChild(picker);
  state.reactionPickerEl = picker;
  e.stopPropagation();
}

function sendReaction(msgId, emoji) {
  const data = {
    type: 'reaction',
    senderId: state.myId,
    msgId,
    emoji,
  };
  broadcast(data);
  applyReaction(data);
}

function applyReaction(data) {
  const area = document.getElementById(`reactions-${data.msgId}`);
  if (!area) return;

  // Find message and update
  let msg = null;
  for (const msgs of Object.values(state.messages)) {
    msg = msgs.find(m => m.id === data.msgId);
    if (msg) break;
  }
  if (!msg) return;
  if (!msg.reactions) msg.reactions = {};
  if (!msg.reactions[data.emoji]) msg.reactions[data.emoji] = new Set();
  // Toggle
  const set = msg.reactions[data.emoji];
  if (set.has ? set.has(data.senderId) : false) {
    set.delete(data.senderId);
  } else {
    if (typeof set.add === 'function') set.add(data.senderId);
    else msg.reactions[data.emoji] = [data.senderId];
  }
  renderReactions(area, msg.reactions, data.msgId);
}

function renderReactions(area, reactions, msgId) {
  area.innerHTML = '';
  Object.entries(reactions).forEach(([emoji, users]) => {
    const count = users instanceof Set ? users.size : (Array.isArray(users) ? users.length : 0);
    if (count === 0) return;
    const mine = users instanceof Set ? users.has(state.myId) : (Array.isArray(users) && users.includes(state.myId));
    const chip = document.createElement('button');
    chip.className = `reaction-chip${mine ? ' mine' : ''}`;
    chip.innerHTML = `${emoji}<span class="reaction-count">${count}</span>`;
    chip.onclick = () => sendReaction(msgId, emoji);
    area.appendChild(chip);
  });
}

// ══════════════════════════════════════════
//  TYPING
// ══════════════════════════════════════════
function handleTyping() {
  broadcast({ type: 'typing', senderId: state.myId, username: state.username, isTyping: true });
  clearTimeout(state.typingTimeout);
  state.typingTimeout = setTimeout(clearTyping, 2500);
}

function clearTyping() {
  broadcast({ type: 'typing', senderId: state.myId, username: state.username, isTyping: false });
}

function updateTyping(data) {
  if (data.isTyping) {
    state.typingUsers[data.senderId] = data.username;
  } else {
    delete state.typingUsers[data.senderId];
  }
  renderTyping();
}

function renderTyping() {
  const bar = document.getElementById('typing-bar');
  const names = Object.values(state.typingUsers);
  if (names.length === 0) { bar.innerHTML = ''; return; }
  const text = names.length === 1 ? `${names[0]} is typing` :
    names.length === 2 ? `${names[0]} and ${names[1]} are typing` :
    `${names.length} people are typing`;
  bar.innerHTML = `
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span>${escHtml(text)}</span>`;
}

// ══════════════════════════════════════════
//  FILE / IMAGE
// ══════════════════════════════════════════
function handleFile(e) {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  if (file.size > 2 * 1024 * 1024) { showToast('⚠️ Max size', 'Image must be under 2MB'); return; }

  const reader = new FileReader();
  reader.onload = (ev) => {
    const msg = {
      type: 'message',
      id: Date.now() + '-' + state.myId,
      senderId: state.myId,
      username: state.username,
      avatar: state.avatar,
      image: ev.target.result,
      text: '',
      timestamp: Date.now(),
      reactions: {},
    };
    broadcast(msg);
    appendMessage(msg, true);
    storeMessage(msg);
    playSound('send');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ══════════════════════════════════════════
//  EMOJI PICKER
// ══════════════════════════════════════════
function initEmoji() {
  const cats = document.getElementById('emoji-cats');
  const grid = document.getElementById('emoji-grid');

  Object.keys(EMOJI_DATA).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = `emoji-cat-btn${cat === state.activeEmojiCat ? ' active' : ''}`;
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.activeEmojiCat = cat;
      renderEmojiGrid();
    };
    cats.appendChild(btn);
  });
  renderEmojiGrid();
}

function renderEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  (EMOJI_DATA[state.activeEmojiCat] || []).forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = em;
    btn.onclick = () => insertEmoji(em);
    grid.appendChild(btn);
  });
}

function insertEmoji(emoji) {
  const input = document.getElementById('msg-input');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
}

function toggleEmoji() {
  state.emojiOpen = !state.emojiOpen;
  document.getElementById('emoji-picker').classList.toggle('open', state.emojiOpen);
}

function closeEmoji() {
  state.emojiOpen = false;
  document.getElementById('emoji-picker').classList.remove('open');
}

// ══════════════════════════════════════════
//  SOUND
// ══════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playSound(type) {
  if (!state.soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (type === 'send') {
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    } else {
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.15);
    }
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.2);
  } catch(_) {}
}

function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  document.getElementById('sound-btn').textContent = state.soundEnabled ? '🔔' : '🔕';
  showToast('Sound ' + (state.soundEnabled ? 'on 🔔' : 'off 🔕'), '');
}

// ══════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════
function setConnStatus(online) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.classList.toggle('offline', !online);
  label.textContent = online ? 'Live' : 'Reconnecting...';
}

function renderUserSelf() {
  document.getElementById('user-self-display').innerHTML = `
    <div class="user-avatar" style="background:${state.avatar.bg};width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;">
      ${state.avatar.emoji}
    </div>
    <div>
      <div class="user-self-name">${escHtml(state.username)}</div>
      <div class="user-self-status">● Online</div>
    </div>
  `;
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('scroll-btn').style.display = 'none';
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyInvite() {
  const url = window.location.href.split('?')[0] + '?room=' + encodeURIComponent(state.currentRoom);
  navigator.clipboard.writeText(url).catch(() => {});
  showToast('🔗 Link copied!', 'Share it to invite others');
}

function toggleUsersPanel() {
  const panel = document.getElementById('users-panel');
  panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}

function showToast(title, msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<div style="font-size:20px">${title.split(' ')[0]}</div><div><b style="font-size:13px">${escHtml(title.split(' ').slice(1).join(' ') || title)}</b>${msg ? `<div style="color:var(--text-muted);font-size:12px">${escHtml(msg)}</div>` : ''}</div>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// Handle URL param for room
function checkUrlRoom() {
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room');
  if (room) document.getElementById('room-input').value = room;
}

// ══════════════════════════════════════════
//  BROADCAST CHANNEL FALLBACK
//  (used if WebSocket fails)
// ══════════════════════════════════════════
// Already handled in connectWebSocket's catch

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
checkUrlRoom();
initLogin();

// Announce leave on close
window.addEventListener('beforeunload', () => {
  broadcast({ type: 'leave', senderId: state.myId });
});
</script>
